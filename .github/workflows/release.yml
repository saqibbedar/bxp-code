# ──────────────────────────────────────────────────────────────
# Create a GitHub Release
#
# Trigger: Automatically on push to main when .github/release-info.md changes.
#
# Reads version and body from .github/release-info.md.
# Update that file, push to main, and a release is created.
# ──────────────────────────────────────────────────────────────
name: Create Release

on:
  push:
    paths:
      - ".github/release-info.md"
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from release-info
        id: get_version
        run: |
          VERSION=$(grep "version:" .github/release-info.md | head -n 1 | cut -d' ' -f2 | tr -d '\r')
          if [ -z "$VERSION" ]; then
            echo "::error::version not found in .github/release-info.md"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Delete existing tag and release (if any)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push --delete origin "v${{ steps.get_version.outputs.version }}" || true
          gh release delete "v${{ steps.get_version.outputs.version }}" --yes || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: bxp-code v${{ steps.get_version.outputs.version }}
          body_path: .github/release-info.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
